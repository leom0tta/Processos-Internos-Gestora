<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Hub de Processos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      color: #1B3A5C;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #1B3A5C;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13.5px;
      color: #6b7c93;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #DEEAF1;
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .btn-microsoft {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #1B3A5C;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14.5px;
      font-weight: 700;
      font-family: Arial, sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s, transform .1s;
    }
    .btn-microsoft:hover  { opacity: .88; }
    .btn-microsoft:active { transform: scale(.98); }

    .ms-logo {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .ms-logo span {
      display: block;
      width: 9px;
      height: 9px;
    }
    .ms-logo .r1 { background: #F25022; }
    .ms-logo .r2 { background: #7FBA00; }
    .ms-logo .r3 { background: #00A4EF; }
    .ms-logo .r4 { background: #FFB900; }
    .ms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }

    .error {
      background: #fdf0f0;
      color: #c0392b;
      border: 1px solid #f0b8b8;
      border-radius: 7px;
      padding: 11px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      text-align: left;
    }

    .footer {
      margin-top: 32px;
      font-size: 11.5px;
      color: #a0adb8;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Fatorial Capital</div>
  <div class="divider"></div>
  <div class="title">Hub de Processos</div>
  <div class="subtitle">Acesse com sua conta Microsoft corporativa para continuar.</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <a href="/auth/start" class="btn-microsoft">
    <div class="ms-logo">
      <div class="ms-grid">
        <span class="r1"></span>
        <span class="r2"></span>
        <span class="r3"></span>
        <span class="r4"></span>
      </div>
    </div>
    Entrar com Microsoft
  </a>

  <div class="footer">Uso restrito a colaboradores da Fatorial Capital</div>
</div>

</body>
</html>
